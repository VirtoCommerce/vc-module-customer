<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Customer">
  <title>Customer</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#F87FAC"/>
      <stop offset="100%" stop-color="#DB3E78"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#7A1A40" flood-opacity="0.30"/>
    </filter>
    <clipPath id="av"><circle cx="0" cy="0" r="38"/></clipPath>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,62)" filter="url(#lift)">
    <!-- person inside the avatar circle -->
    <g clip-path="url(#av)">
      <circle cx="0" cy="-9" r="15" fill="#ffffff"/>
      <path d="M-30,44 C-30,18 -15,10 0,10 C15,10 30,18 30,44 Z" fill="#ffffff"/>
    </g>
    <!-- avatar ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#ffffff" stroke-width="6"/>

    <!-- B2B / organization badge (office building) -->
    <circle cx="31" cy="31" r="16" fill="#ffffff" stroke="#ED6A98" stroke-width="3"/>
    <rect x="23" y="24" width="9" height="17" rx="1.5" fill="#2F6BD6"/>
    <rect x="32" y="20" width="10" height="21" rx="1.5" fill="#3A78E0"/>
    <g fill="#ffffff">
      <rect x="25" y="27" width="2.3" height="2.3"/><rect x="28.4" y="27" width="2.3" height="2.3"/>
      <rect x="25" y="32" width="2.3" height="2.3"/><rect x="28.4" y="32" width="2.3" height="2.3"/>
      <rect x="34" y="23" width="2.5" height="2.5"/><rect x="38" y="23" width="2.5" height="2.5"/>
      <rect x="34" y="28" width="2.5" height="2.5"/><rect x="38" y="28" width="2.5" height="2.5"/>
      <rect x="34" y="33" width="2.5" height="2.5"/><rect x="38" y="33" width="2.5" height="2.5"/>
    </g>
  </g>
</svg>
