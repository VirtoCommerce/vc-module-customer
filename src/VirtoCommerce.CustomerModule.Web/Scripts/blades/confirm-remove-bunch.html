<div class="modal-window">
  <div class="modal-window__header modal-window__header--error">
    <div class="modal-window__title">{{ title | translate: titleValues}}</div>
    <button class="modal-window__header-button" ng-click="cancel()" title="{{ 'platform.commands.cancel' | translate }}">
      <i class="fa fa-times" aria-hidden="true"></i>
    </button>
  </div>

  <div class="modal-window__body">
    <div class="modal-window__dialog-message">
      <div style="display: flex; flex-direction: row; gap: 20px">
        <div>
          <img src="/images/dialogs/icon-error.svg" />
        </div>
        <div style="display: flex; flex-direction: column;">
          <div style="font-weight: bold;">
            WARNING: This change is permanent and cannot be undone. Applying this change may result in a data loss.
          </div>

          <div>
            The following data will be deleted:
            <ul>
              <li ng-repeat="item in data">
                {{ item.memberType }}: {{ item.name }}
              </li>
            </ul>
          </div>

          <div>
            Type 'yes' to delete:
          </div>

          <div class="form-input">
            <input type="text" ng-model="confirmText" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-window__footer">
    <button class="modal-window__footer-button modal-window__footer-button--primary-outline" ng-click="yes()" ng-disabled="confirmText !== 'yes'">{{ 'platform.commands.yes' | translate}}</button>
    <button class="modal-window__footer-button modal-window__footer-button--primary" ng-click="no()">{{ 'platform.commands.no' | translate}}</button>
  </div>
</div>
